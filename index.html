<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don't Ball Up Your Stress</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: white;
  color: #111;
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px;
}

#audit {
  background: #1a6fd4;
  color: white;
  padding: 40px 20px;
  margin: 0 -20px;
}

.audit-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.bar-wrap {
  height: 36px;
  background: #222;
  overflow: hidden;
  margin-top: 24px;
}

.bar-seg {
  float: left;
  height: 100%;
}

.over {
  opacity: 0.5;
}
</style>
</head>
<body>

<section id="audit">

<h2>Daily Time Audit</h2>

<div class="audit-row">
  <label>Daily Tasks</label>
  <input type="number" id="a-daily" value="0" oninput="updateChart()">
</div>

<div class="audit-row">
  <label>School</label>
  <input type="number" id="a-school" value="0" oninput="updateChart()">
</div>

<div class="audit-row">
  <label>Job</label>
  <input type="number" id="a-job" value="0" oninput="updateChart()">
</div>

<div class="audit-row">
  <label>Distractions</label>
  <input type="number" id="a-distract" value="0" oninput="updateChart()">
</div>

<div class="bar-wrap" id="bar-wrap">
  <div class="bar-seg" id="seg-daily" style="background:#4da6ff;"></div>
  <div class="bar-seg" id="seg-school" style="background:#f5c518;"></div>
  <div class="bar-seg" id="seg-job" style="background:#27ae60;"></div>
  <div class="bar-seg" id="seg-distract" style="background:#e74c3c;"></div>
  <div class="bar-seg" id="seg-empty" style="background:#555;"></div>
</div>

<p id="hours-total"></p>

</section>

<script>
function updateChart() {
  var daily = parseFloat(document.getElementById('a-daily').value) || 0;
  var school = parseFloat(document.getElementById('a-school').value) || 0;
  var job = parseFloat(document.getElementById('a-job').value) || 0;
  var distract = parseFloat(document.getElementById('a-distract').value) || 0;

  var total = daily + school + job + distract;

  var empty = Math.max(0, 24 - total);

  document.getElementById('seg-daily').style.width = (daily / 24 * 100) + '%';
  document.getElementById('seg-school').style.width = (school / 24 * 100) + '%';
  document.getElementById('seg-job').style.width = (job / 24 * 100) + '%';
  document.getElementById('seg-distract').style.width = (distract / 24 * 100) + '%';
  document.getElementById('seg-empty').style.width = (empty / 24 * 100) + '%';

  document.getElementById('hours-total').textContent =
    'Total logged: ' + total.toFixed(1) + ' hrs out of 24';

  if (total > 24) {
    document.getElementById('bar-wrap').classList.add('over');
  } else {
    document.getElementById('bar-wrap').classList.remove('over');
  }
}
</script>

</body>
</html>
