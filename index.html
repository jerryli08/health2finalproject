<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don't Ball Up Your Stress</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 860px;
  margin: 0 auto;
  padding: 20px;
}

.audit-row {
  margin-bottom: 12px;
}

.bar-wrap {
  height: 40px;
  background: #222;
  margin-top: 20px;
}

.bar-seg {
  height: 100%;
  float: left;
}
</style>

</head>
<body>

<h1>Daily Time Audit</h1>

<div class="audit-row">
  <label>Daily Tasks</label>
  <input type="number" id="daily" value="0" oninput="updateChart()">
</div>

<div class="audit-row">
  <label>School</label>
  <input type="number" id="school" value="0" oninput="updateChart()">
</div>

<div class="audit-row">
  <label>Distractions</label>
  <input type="number" id="distractions" value="0" oninput="updateChart()">
</div>

<div class="bar-wrap">
  <div class="bar-seg" id="daily-bar" style="background:#4da6ff;"></div>
  <div class="bar-seg" id="school-bar" style="background:#f5c518;"></div>
  <div class="bar-seg" id="distractions-bar" style="background:#e74c3c;"></div>
</div>

<p id="total"></p>

<script>
function updateChart() {
  var daily = parseFloat(document.getElementById('daily').value) || 0;
  var school = parseFloat(document.getElementById('school').value) || 0;
  var distractions = parseFloat(document.getElementById('distractions').value) || 0;

  var total = daily + school + distractions;

  document.getElementById('daily-bar').style.width = (daily / 24 * 100) + '%';
  document.getElementById('school-bar').style.width = (school / 24 * 100) + '%';
  document.getElementById('distractions-bar').style.width = (distractions / 24 * 100) + '%';

  document.getElementById('total').textContent = total + ' hours used';
}
</script>

</body>
</html>
