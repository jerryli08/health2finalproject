<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don't Ball Up Your Stress</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px;
}
.hero {
  background: #1a6fd4;
  color: white;
  padding: 50px 20px;
  margin: 0 -20px;
}
section {
  padding: 40px 0;
}
.audit-row {
  margin-bottom: 12px;
}
.bar-wrap {
  height: 40px;
  background: #ddd;
  margin-top: 20px;
}
.bar-seg {
  height: 100%;
  float: left;
}
</style>
</head>
<body>

<div class="hero">
  <h1>Don't Ball Up Your Stress</h1>
</div>

<section>
  <h2>Daily Time Audit</h2>
  <div class="audit-row">
    <label>Sleep</label>
    <input type="number" id="sleep">
  </div>
  <div class="audit-row">
    <label>School</label>
    <input type="number" id="school">
  </div>
  <div class="audit-row">
    <label>Social Media</label>
    <input type="number" id="social">
  </div>
  <div class="bar-wrap">
    <div class="bar-seg" style="width:25%; background:#4da6ff;"></div>
    <div class="bar-seg" style="width:25%; background:#f5c518;"></div>
    <div class="bar-seg" style="width:25%; background:#e74c3c;"></div>
  </div>
</section>
</body>
</html>
